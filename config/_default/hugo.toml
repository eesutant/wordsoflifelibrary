publishDir = "docs"

# -- Site Configuration --
# Refer to the theme docs for more details about each of these parameters.
# https://blowfish.page/docs/getting-started/

theme = "blowfish"
baseURL = "https://wordsoflifelibrary.org/"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

pluralizeListTitles = false # hugo function useful for non-english languages, find out more in  https://gohugo.io/getting-started/configuration/#pluralizelisttitles

enableRobotsTXT = true
summaryLength = 0

buildDrafts = false
buildFuture = false

enableEmoji = true
#pluralizeListTitles = false

# googleAnalytics = "G-XXXXXXXXX"

[pagination]
  pagerSize = 100

[imaging]
  anchor = 'Center'

[taxonomies]
  tag = "tags"
  category = "categories"
  author = "authors"
  series = "series"

[sitemap]
  changefreq = 'daily'
  filename = 'sitemap.xml'
  priority = 0.5

[outputs]
  home = ["HTML", "RSS", "JSON"]

[related]
  threshold = 0
  toLower = false

    [[related.indices]]
        name = "tags"
        weight = 100

    [[related.indices]]
        name = "categories"
        weight = 100

    [[related.indices]]
        name = "series"
        weight = 50

    [[related.indices]]
        name = "authors"
        weight = 20

    [[related.indices]]
        name = "date"
        weight = 10

    [[related.indices]]
      applyFilter = false
      name = 'fragmentrefs'
      type = 'fragments'
      weight = 10

[languages]

  [languages.en]
    languageName = "English"
	title = "Words of Life Library"
    weight = 1

  [languages.bn]
    languageName = "Bangla"
	title = "Words of Life Library"
    weight = 2
 [params]
  #disableLandingPage = true
  disableTurbo = true
  disableInstantPage = true
[params.header]
    layout = "basic"
    showTitle = true

[menu]

  [[menu.main]]
    name  = "Words of Life Library"
    url   = "/"
    weight = 1